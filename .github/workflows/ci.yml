name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@38ecb5b593bf0eb19e335c03f97670f792489a8b # v4.7.0

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate compose configuration
        env:
          DB_NAME: evershop
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
          DB_SSLMODE: disable
          SHOP_URL: https://printel.ro
          ADMIN_URL: https://printel.ro/admin
        run: npm run prebuild:ci

  build:
    needs: pre-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NODE_ENV: production
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: evershop
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSLMODE: disable
          PORT: 3000
          SHOP_URL: https://printel.ro
          ADMIN_URL: https://printel.ro/admin
        run: npm run build

      - name: Build production image
        run: docker build --tag printel:${{ github.sha }} .

  unit-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  lint-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

  playwright-tests:
    needs:
      - unit-test
      - lint-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: evershop
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run Playwright tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: evershop
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSLMODE: disable
          SHOP_URL: http://127.0.0.1:3001
          ADMIN_URL: http://127.0.0.1:3001/admin
          PORT: 3001
          PLAYWRIGHT_PORT: 3001
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
          PLAYWRIGHT_ADMIN_EMAIL: playwright-admin@printel.local
          PLAYWRIGHT_ADMIN_PASSWORD: Playwright123!
        run: npm run test:e2e

  deploy:
    needs:
      - build
      - unit-test
      - lint-test
      - playwright-tests
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on:
      - self-hosted
      - linux
      - x64
      - printel-production
    environment:
      name: production
      url: https://printel.ro
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate deploy path
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          if [[ -z "$DEPLOY_PATH" ]]; then
            echo 'Missing repository/environment variable DEPLOY_PATH.' >&2
            exit 1
          fi
          install -d "$DEPLOY_PATH"

      - name: Sync workspace into production path
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.evershop' \
            --exclude 'test-results' \
            ./ "$DEPLOY_PATH/"

      - name: Rebuild and restart production stack
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          set -e
          cd "$DEPLOY_PATH"
          docker compose up -d --build